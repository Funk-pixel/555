<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGRIDERA - Contact Us</title>
    <link rel="stylesheet" href="contact-style.css">
    <link rel="stylesheet" href="responsive.css">
</head>
<body>

    <header class="header">
        <div class="container header__inner">
            <div class="logo">
                <img src="Logo@2x.png" alt="AGRIDERA Logo">
            </div>
            <div class="header__right">
                <div class="search-box">
                    <input type="text" placeholder="Search" class="search-input">
                    <button class="search-btn">🔍</button>
                </div>
                <input type="checkbox" id="menu-toggle" style="display: none;">

    <label for="menu-toggle" class="mobile-menu-btn">
        <span></span>
        <span></span>
        <span></span>
    </label>
                <nav class="nav">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="#" class="nav-link">Company Profile</a>
                    <a href="tomato_all.html" class="nav-link">Products</a>
                    <a href="#" class="nav-link">Services</a>
                    <a href="#" class="nav-link">R & D</a>
                    <a href="#" class="nav-link nav-link--active">Contact</a>
                </nav>
            </div>
        </div>
    </header>

    <section class="banner">
        <img src="image 7.jpg" alt="Field Banner" class="banner-img">
    </section>

    <main class="form-section">
        <div class="container">
            <h1 class="page-title">Contact us</h1>
            <div class="divider">*****</div>

            <form class="contact-form">
                <div class="form-grid">
                    <div class="form-col">
                        <div class="form-group"><label>Name *</label><input type="text" required></div>
                        <div class="form-group"><label>Company Name</label><input type="text"></div>
                        <div class="form-group"><label>Position</label><input type="text"></div>
                        <div class="form-group"><label>City</label><input type="text"></div>
                        <div class="form-group"><label>Country</label><input type="text"></div>
                        <div class="form-group"><label>Telephone</label><input type="tel"></div>
                        <div class="form-group"><label>Email *</label><input type="email" required></div>
                    </div>

                    <div class="form-col">
                        <div class="form-group">
                            <label>You are a</label>
                            <select><option>seed producer</option></select>
                        </div>
                        <div class="form-group"><label>If other, please specify</label><input type="text"></div>
                        <div class="form-group textarea-group">
                            <label>You are interested in</label>
                            <textarea></textarea>
                        </div>
                    </div>
                </div>

                <div class="form-bottom">
                    <div class="captcha-box">
                        <label class="captcha-label">Please type this code</label>
                        <div class="captcha-row">
                            <span class="captcha-img">7 c J 3</span>
                            <input type="text" class="captcha-input">
                        </div>
                    </div>
                    <button type="submit" class="send-btn">Send Message</button>
                </div>
            </form>
        </div>
    </main>

    <section class="address-section-white">
        <div class="container">
            <h3 class="addr-title">Our Address</h3>
            <div class="address-text">
                <p>AGRIDERA Seeds & Agriculture Ltd.</p>
                <p>P.O Box 103, Gedera 70750, Israel.</p>
                <p>Telephone: <span class="green-text">+972 8 944 9222</span></p>
            </div>
        </div>
    </section>

    <footer class="main-footer">
        <div class="container footer__inner">
            <div class="footer-top">
                <nav class="footer-links">
                    <a href="#">PROFILE</a> | <a href="#">MANAGEMENT</a> | <a href="#">PRODUCTS</a> | 
                    <a href="#">R&D</a> | <a href="#">LINKS</a> | <a href="#">SITEMAP</a> | <a href="#">CONTACT</a>
                </nav>
                <div class="social-icons">
                    <a href="#" class="social-link"><img src="Ico_in.png" alt="LinkedIn"></a>
                    <a href="#" class="social-link"><img src="Ico_inst.png" alt="Instagram"></a>
                    <a href="#" class="social-link"><img src="Ico_tube.png" alt="YouTube"></a>
                    <a href="#" class="social-link"><img src="Ico_tw.png" alt="Twitter"></a>
                    <a href="#" class="social-link"><img src="Ico_fb.png" alt="Facebook"></a>
                </div>
            </div>
            <div class="footer-copy">
                AGRIDERA SEEDS & AGRICULTURE LTD. © 2020
            </div>
        </div>
    </footer>

</body>
</html>
